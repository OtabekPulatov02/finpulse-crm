<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Finpulse CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages.css">
</head>
<body class="no-shell">
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark">F</div>
      </div>
      <div class="login-title">Finpulse CRM</div>
      <p class="login-subtitle">Учёт клиентов и управление задачами бухгалтерии</p>

      <form onsubmit="window.location.href='dashboard.html'; return false;">
        <div class="form-group">
          <label class="form-label" for="login-email">Электронная почта</label>
          <div class="input-icon-wrap">
            <i data-lucide="mail" class="icon"></i>
            <input type="email" id="login-email" class="input" placeholder="y.ibragimova@finpulse.ru" value="y.ibragimova@finpulse.ru" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Пароль</label>
          <div class="input-icon-wrap">
            <i data-lucide="lock" class="icon"></i>
            <input type="password" id="login-pass" class="input" placeholder="••••••••" value="demo1234" required>
          </div>
        </div>
        <div class="form-group flex items-center justify-between">
          <label class="checkbox-label"><input type="checkbox" checked> Запомнить меня</label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">
          <i data-lucide="log-in" class="icon"></i>Войти
        </button>
      </form>

      <div class="login-footer">
        <a href="#" data-toast="info|Восстановление пароля|В прототипе это макет: письмо со ссылкой отправляется на почту.">Забыли пароль?</a>
      </div>
      <p class="login-copy">© 2026 Finpulse CRM · Внутренняя система бухгалтерской компании</p>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
